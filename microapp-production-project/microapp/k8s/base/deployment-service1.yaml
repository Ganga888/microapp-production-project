apiVersion: apps/v1
kind: Deployment
metadata:
  name: service1
  namespace: microapp
  labels:
    app: service1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service1
  template:
    metadata:
      labels:
        app: service1
        version: v1
    spec:
      containers:
        - name: service1
          image: YOUR_DOCKERHUB_USERNAME/service1:v1
          ports:
            - containerPort: 5000
          env:
            - name: SERVICE_NAME
              value: "service1"
            - name: VERSION
              value: "v1"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: service1
  namespace: microapp
spec:
  selector:
    app: service1
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
